<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#4A1D4F" />
    <meta name="description" content="BR Gorjeta - Portal de Gestão de Gorjetas" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="icon" type="image/png" href="%PUBLIC_URL%/images/icon.png" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/images/icon.png" />
    <title>BR Gorjeta</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        width: 100%; height: 100%;
        font-family: 'Nunito', system-ui, sans-serif;
        background: #f5f7fb;
      }
      #root { width: 100%; height: 100%; }
      .loading-screen {
        display: flex; justify-content: center; align-items: center;
        width: 100%; height: 100vh;
        background: #4A1D4F;
      }
      .spinner {
        border: 4px solid rgba(255,255,255,0.2);
        border-top: 4px solid #F9678C;
        border-radius: 50%; width: 40px; height: 40px;
        animation: spin 1s linear infinite;
      }
      @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
      .loading-text { margin-left: 16px; color: rgba(255,255,255,0.7); font-size: 0.95rem; }
    </style>
  </head>
  <body>
    <noscript>
      <p style="text-align: center; padding: 40px; color: #991b1b;">
        Este aplicativo requer JavaScript habilitado para funcionar.
      </p>
    </noscript>
    <div id="root">
      <div class="loading-screen">
        <div class="spinner"></div>
        <div class="loading-text">Carregando...</div>
      </div>
    </div>
  </body>
</html>
