<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#2e3191" />
    <meta
      name="description"
      content="Sistema de Geração de Crédito - Adicione crédito para colaboradores ativos"
    />
    <title>Geração de Crédito</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
        background: #f5f7fb;
      }

      #root {
        width: 100%;
        height: 100%;
      }

      /* Loading Screen */
      .loading-screen {
        display: flex;
        justify-content: center;
        align-items: center;
        width: 100%;
        height: 100vh;
        background: linear-gradient(135deg, #f5f7fb 0%, #e8ecf1 100%);
      }

      .spinner {
        border: 4px solid #e5e7eb;
        border-top: 4px solid #2e3191;
        border-radius: 50%;
        width: 40px;
        height: 40px;
        animation: spin 1s linear infinite;
      }

      @keyframes spin {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }

      .loading-text {
        margin-left: 16px;
        color: #6b7280;
        font-size: 0.95rem;
      }
    </style>
  </head>
  <body>
    <noscript>
      <p style="text-align: center; padding: 40px; color: #991b1b;">
        ⚠️ Este aplicativo requer JavaScript habilitado para funcionar.
      </p>
    </noscript>

    <div id="root">
      <div class="loading-screen">
        <div class="spinner"></div>
        <div class="loading-text">Carregando...</div>
      </div>
    </div>

    <script src="./index.js"></script>
  </body>
</html>
